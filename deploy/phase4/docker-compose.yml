name: iicpc-phase4

services:
  redpanda:
    image: redpandadata/redpanda:v24.3.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: iicpc
    ports:
      - "5432:5432"
    volumes:
      - ./timescaledb-init:/docker-entrypoint-initdb.d:ro

