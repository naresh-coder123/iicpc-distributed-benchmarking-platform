kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: iicpc
nodes:
  - role: control-plane
    # Expose NodePorts to host for UI/API access
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
  - role: worker
  - role: worker

