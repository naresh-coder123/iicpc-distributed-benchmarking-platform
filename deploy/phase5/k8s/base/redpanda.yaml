apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: iicpc-telemetry
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: pandaproxy
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: iicpc-telemetry
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      # 🚀 PERMISSION FIX: Automatically chowns the Azure volume mount path to the redpanda user
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.3.8
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - "768M"          # 🚀 LOWERED: This leaves breathing room below the k8s limit!
            - --reserve-memory
            - "0M"
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://redpanda.iicpc-telemetry.svc.cluster.local:9092
            - --pandaproxy-addr
            - 0.0.0.0:8082
            - --advertise-pandaproxy-addr
            - redpanda.iicpc-telemetry.svc.cluster.local:8082
          ports:
            - containerPort: 9092
            - containerPort: 8082
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi       # ✅ Keeps a safe overhead threshold margin
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi