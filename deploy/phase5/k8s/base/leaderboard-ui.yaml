apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-ui
  namespace: iicpc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaderboard-ui
  template:
    metadata:
      labels:
        app: leaderboard-ui
    spec:
      containers:
        - name: leaderboard-ui
          image: iicpcregistery.azurecr.io/leaderboard-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-ui
  namespace: iicpc-frontend
spec:
  type: LoadBalancer  # 🚀 CHANGED from NodePort
  selector:
    app: leaderboard-ui
  ports:
    - name: http
      port: 80        # 🌐 Change port to 80 so you can just type the IP in your browser without adding :3000
      targetPort: 3000
