apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-api
  namespace: iicpc-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge-api
  template:
    metadata:
      labels:
        app: judge-api
    spec:
      serviceAccountName: judge-api
      containers:
        - name: judge-api
          image: iicpc/judge-api:latest
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - :8081
            - --redis
            - redis.iicpc-telemetry.svc.cluster.local:6379
            - --kafka
            - redpanda.iicpc-telemetry.svc.cluster.local:9092
            - --kafka-topic
            - metrics
            - --bots
            - "50"
            - --ops
            - "200"
            - --duration
            - "60"
            - --sandbox-port
            - "50052"
          ports:
            - containerPort: 8081
          # Mount the Docker socket so the judge can launch sandbox containers.
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: judge-api
  namespace: iicpc-runner
spec:
  type: NodePort
  selector:
    app: judge-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
---
# ServiceAccount for judge-api (future RBAC expansion).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: judge-api
  namespace: iicpc-runner
