apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-api
  namespace: iicpc-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge-api
  template:
    metadata:
      labels:
        app: judge-api
    spec:
      serviceAccountName: judge-api
      containers:
        - name: judge-api
          image: iicpcregistery.azurecr.io/judge-api:latest
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - :8081
            - --redis
            - redis.iicpc-telemetry.svc.cluster.local:6379
            - --kafka
            - redpanda.iicpc-telemetry.svc.cluster.local:9092
            - --kafka-topic
            - metrics
            - --bots
            - "50"
            - --ops
            - "200"
            - --duration
            - "60"
          env:
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: LEADERBOARD_UI_ORIGIN
                  optional: true
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
# judge-api is ClusterIP — no public IP consumed.
# The leaderboard-api acts as a reverse proxy via /proxy/judge/* over cluster DNS.
apiVersion: v1
kind: Service
metadata:
  name: judge-api
  namespace: iicpc-runner
spec:
  type: ClusterIP
  selector:
    app: judge-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
# ServiceAccount for judge-api (reserved for K8s API sandbox orchestration).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: judge-api
  namespace: iicpc-runner